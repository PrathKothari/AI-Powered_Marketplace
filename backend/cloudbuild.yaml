steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/kalasetu/backend:$COMMIT_SHA
      - --tag=us-central1-docker.pkg.dev/$PROJECT_ID/kalasetu/backend:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/kalasetu/backend

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - kalasetu-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/kalasetu/backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --timeout=3600
      - --min-instances=1
      - --max-instances=5
      - --service-account=firebase-adminsdk-fbsvc@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,VEO_ENABLED=true,VEO_MODEL_ID=veo-2.0-generate-001,GEMINI_MODEL_NAME=gemini-2.5-flash,GCS_BUCKET_NAME=ai-market-asst-1.firebasestorage.app,GCS_PUBLIC_PREFIX=reels,FIREBASE_STORAGE_BUCKET=ai-market-asst-1.firebasestorage.app,FIREBASE_PROJECT_ID=ai-market-asst-1
      - --set-secrets=SECRET_KEY=kalasetu-secret-key:latest,GEMINI_API_KEY=gemini-api-key:latest,RAZORPAY_KEY_ID=razorpay-key-id:latest,RAZORPAY_KEY_SECRET=razorpay-key-secret:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,EMAIL_PASSWORD=email-password:latest,PINECONE_API_KEY=pinecone-api-key:latest,GOOGLE_CLIENT_ID=google-client-id:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
